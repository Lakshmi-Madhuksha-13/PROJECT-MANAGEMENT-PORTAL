databases:
  - name: projectnest-db
    databaseName: projectnest
    plan: free

services:
  - type: web
    name: projectnest-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: projectnest-db
          property: connectionString
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: '*'
